<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Re-Ally Hyderabad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav style="position:fixed;top:0;left:0;right:0;z-index:1000;background:#960018;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 4%;box-sizing:border-box;">
    
    <!-- HAMBURGER (mobile only) -->
    <button onclick="toggleMenu()" id="hamburgerBtn" style="background:none;border:none;cursor:pointer;padding:6px;display:none;flex-direction:column;gap:5px;align-items:center;justify-content:center;" aria-label="Menu">
      <span style="display:block;width:22px;height:2px;background:#f8f8f7;border-radius:2px;"></span>
      <span style="display:block;width:22px;height:2px;background:#f8f8f7;border-radius:2px;"></span>
      <span style="display:block;width:22px;height:2px;background:#f8f8f7;border-radius:2px;"></span>
    </button>

    <!-- DESKTOP LEFT LINKS -->
    <div id="desktopLinks" style="display:flex;gap:1.5rem;align-items:center;">
      <a href="listings.html" style="color:#f8f8f7;text-decoration:none;font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;opacity:0.8;">Listings</a>
      <a href="services.html" style="color:#f8f8f7;text-decoration:none;font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;opacity:0.8;">Services</a>
      <a href="about.html" style="color:#f8f8f7;text-decoration:none;font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;opacity:0.8;">About</a>
    </div>

    <!-- CENTER LOGO -->
    <a href="index.html" style="font-family:Georgia,serif;font-size:1.4rem;color:#f8f8f7;text-decoration:none;letter-spacing:0.04em;position:absolute;left:50%;transform:translateX(-50%);">Re-Ally</a>

    <!-- RIGHT CONTACT -->
    <a href="contact.html" style="background:#f8f8f7;color:#960018;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:8px 18px;border-radius:50px;text-decoration:none;white-space:nowrap;">Contact Us</a>
  </nav>

  <!-- MOBILE DRAWER MENU -->
  <div id="mobileDrawer" style="display:none;position:fixed;top:64px;left:0;right:0;bottom:0;background:rgba(63,48,39,0.96);z-index:999;flex-direction:column;padding:2rem 6%;">
    <a href="index.html" style="color:#f8f8f7;text-decoration:none;font-family:Georgia,serif;font-size:1.4rem;padding:1rem 0;border-bottom:1px solid rgba(248,248,247,0.1);display:block;">Home</a>
    <a href="listings.html" style="color:#f8f8f7;text-decoration:none;font-family:Georgia,serif;font-size:1.4rem;padding:1rem 0;border-bottom:1px solid rgba(248,248,247,0.1);display:block;">Listings</a>
    <a href="sreyan.html" style="color:#f8f8f7;text-decoration:none;font-family:Georgia,serif;font-size:1.1rem;padding:0.75rem 0 0.75rem 1.5rem;border-bottom:1px solid rgba(248,248,247,0.06);display:block;color:rgba(248,248,247,0.6);">↳ Sreyan by Elegans VRG</a>
    <a href="services.html" style="color:#f8f8f7;text-decoration:none;font-family:Georgia,serif;font-size:1.4rem;padding:1rem 0;border-bottom:1px solid rgba(248,248,247,0.1);display:block;">Services</a>
    <a href="about.html" style="color:#f8f8f7;text-decoration:none;font-family:Georgia,serif;font-size:1.4rem;padding:1rem 0;border-bottom:1px solid rgba(248,248,247,0.1);display:block;">About Us</a>
    <a href="contact.html" style="display:inline-block;margin-top:2rem;background:#960018;color:#f8f8f7;padding:14px 32px;border-radius:50px;font-size:0.85rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;">Contact Us</a>
  </div>

  <style>
    @media (max-width: 768px) {
      #hamburgerBtn { display:flex !important; }
      #desktopLinks { display:none !important; }
      nav > a:last-of-type { font-size:0.65rem !important; padding:7px 12px !important; }
    }
  </style>

  <script>
    function toggleMenu() {
      var drawer = document.getElementById('mobileDrawer');
      var btn = document.getElementById('hamburgerBtn');
      if (drawer.style.display === 'flex') {
        drawer.style.display = 'none';
        document.body.style.overflow = '';
      } else {
        drawer.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }
    }
    // Close on link click
    document.addEventListener('DOMContentLoaded', function() {
      var links = document.querySelectorAll('#mobileDrawer a');
      links.forEach(function(link) {
        link.addEventListener('click', function() {
          document.getElementById('mobileDrawer').style.display = 'none';
          document.body.style.overflow = '';
        });
      });
    });
  </script>
</body>
</html>
